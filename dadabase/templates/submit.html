{% extends "base.html" %}
{% block content %}
<h2>Submit a Dad Joke</h2>
<form method="POST">
    <textarea name="text" rows="3" placeholder="Your joke..." required></textarea><br>
    <input type="text" name="author" placeholder="Your name (optional)">
    <br>
    <button type="submit">Submit</button>
</form>
{% endblock %}
